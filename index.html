<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 동파육</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700;900&family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <nav>
        <button class="nav-link active" onclick="switchTab('home')">HOME</button>
        <button class="nav-link" onclick="switchTab('players')">참가자</button>  
        <button class="nav-link" onclick="switchTab('skeleton')">스켈레톤</button>
        <button class="nav-link" onclick="switchTab('bobsleigh')">봅슬레이</button>
        <button class="nav-link" onclick="switchTab('skijump')">스키점프</button>
        <button class="nav-link" onclick="switchTab('biathlon')">바이애슬론</button>
        <button class="nav-link" onclick="switchTab('standings')">종합순위</button>
    </nav>

    <div class="main-bg-glow"></div>

    <div class="container">
        
        <section id="view-home" class="view-section active">
            <div class="home-container">
                <div class="home-logo-area">
                    <img src="images/logo.png" alt="2026 동파육 LOGO" class="main-home-logo">
                </div>
                <div class="home-nav-area">
                    <button class="trap-btn" onclick="switchTab('players')">
                        <span class="btn-text">참가자</span><span class="btn-arrow">→</span>
                    </button>
                    <button class="trap-btn" onclick="switchTab('skeleton')">
                        <span class="btn-text">스켈레톤</span><span class="btn-arrow">→</span>
                    </button>
                    <button class="trap-btn" onclick="switchTab('bobsleigh')">
                        <span class="btn-text">봅슬레이</span><span class="btn-arrow">→</span>
                    </button>
                    <button class="trap-btn" onclick="switchTab('skijump')">
                        <span class="btn-text">스키점프</span><span class="btn-arrow">→</span>
                    </button>
                    <button class="trap-btn" onclick="switchTab('biathlon')">
                        <span class="btn-text">바이애슬론</span><span class="btn-arrow">→</span>
                    </button>
                    <button class="trap-btn highlight" onclick="switchTab('standings')">
                        <span class="btn-text">종합순위</span><span class="btn-arrow">→</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-players" class="view-section">
            <div class="track-header-card" style="padding:20px; justify-content:center; min-height:auto;">
                <h2 class="track-name-title">2026 동파육</h2>
            </div>
            <div id="players-grid" class="players-grid-container"></div>
        </section>

        <section id="view-skeleton" class="view-section">
            <div class="track-header-card">
                <div class="track-info-box">
                    <h2 class="track-name-title">스켈레톤</h2>
                </div>
                <div class="track-map-wrapper">
                    <img src="images/sports/skeleton.svg" class="track-map-img" alt="Skeleton" onerror="this.style.display='none'">
                </div>
            </div>
            <table class="f1-table">
                <thead>
                    <tr>
                        <th width="10%">순위</th><th width="35%">출전 선수</th>
                        <th width="15%">1차 기록</th><th width="15%">2차 기록</th>
                        <th width="15%">최종 합산</th><th width="10%">차이</th>
                    </tr>
                </thead>
                <tbody id="skeleton-list"></tbody>
            </table>
        </section>

        <section id="view-bobsleigh" class="view-section">
            <div class="track-header-card">
                <div class="track-info-box">
                    <h2 class="track-name-title">봅슬레이</h2>
                </div>
                <div class="track-map-wrapper">
                    <img src="images/sports/bobsleigh.svg" class="track-map-img" alt="Bobsleigh" onerror="this.style.display='none'">
                </div>
            </div>
            <table class="f1-table">
                <thead>
                    <tr>
                        <th width="10%">순위</th><th width="35%">출전 팀</th>
                        <th width="12%">1차 기록</th><th width="12%">2차 기록</th><th width="12%">3차 기록</th>
                        <th width="12%">최종 합산</th><th width="7%">차이</th>
                    </tr>
                </thead>
                <tbody id="bobsleigh-list"></tbody>
            </table>
        </section>

        <section id="view-skijump" class="view-section">
            <div class="track-header-card">
                <div class="track-info-box">
                    <h2 class="track-name-title">스키점프</h2>
                </div>
                <div class="track-map-wrapper">
                    <img src="images/sports/skijump.svg" class="track-map-img" alt="Ski Jump" onerror="this.style.display='none'">
                </div>
            </div>
            <table class="f1-table">
                <thead>
                    <tr>
                        <th width="10%">순위</th><th width="35%">출전 선수</th>
                        <th width="15%">1차 시도</th><th width="15%">2차 시도</th>
                        <th width="15%">최고 기록</th><th width="10%">차이</th>
                    </tr>
                </thead>
                <tbody id="skijump-list"></tbody>
            </table>
        </section>

        <section id="view-biathlon" class="view-section">
            <div class="track-header-card">
                <div class="track-info-box">
                    <h2 class="track-name-title">바이애슬론</h2>
                </div>
                <div class="track-map-wrapper">
                    <img src="images/sports/biathlon.svg" class="track-map-img" alt="Biathlon" onerror="this.style.display='none'">
                </div>
            </div>
            <table class="f1-table">
                <thead>
                    <tr>
                        <th width="10%">순위</th><th width="50%">출전 선수</th>
                        <th width="25%">최종 기록</th><th width="15%">차이</th>
                    </tr>
                </thead>
                <tbody id="biathlon-list"></tbody>
            </table>
        </section>

        <section id="view-standings" class="view-section">
            <div class="track-header-card" style="padding:20px; justify-content:center; min-height:auto; flex-direction:column; gap:15px;">
                <h2 class="track-name-title" style="color:var(--primary-mint);">종합 순위</h2>
                
                <div class="standings-type-nav">
                    <button class="type-btn active" id="btn-type-team" onclick="setStandingsType('team')">팀 순위</button>
                    <button class="type-btn" id="btn-type-player" onclick="setStandingsType('player')">개인 순위</button>
                </div>
                
                <div class="standings-type-nav" style="margin-bottom:0;">
                    <button class="type-btn active" style="font-size:0.85rem;" id="btn-sort-points" onclick="setStandingsSort('points')">총점 순</button>
                    <button class="type-btn" style="font-size:0.85rem;" id="btn-sort-medals" onclick="setStandingsSort('medals')">금메달 순</button>
                </div>
            </div>
            <table class="f1-table">
                <thead>
                    <tr id="standings-header-row"></tr>
                </thead>
                <tbody id="standings-list"></tbody>
            </table>
        </section>

    </div>

    <script>
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && ((e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'C' || e.key === 'c' || e.key === 'J' || e.key === 'j')) || (e.key === 'U' || e.key === 'u'))) { e.preventDefault(); return false; }
        });
    </script>

</body>

</html>
